name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm --prefix app ci || npm --prefix app install
      - run: npm --prefix app run build
